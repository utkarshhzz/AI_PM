<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Landing PPage Personalizer</title>
</head>
<body>
    <h1>AI Landing Page Personalizer</h1>
    <p>Enter your ad creative and landing page below to generate a tailored hreo section</p>

    <form id="personalizer-form">
        <div style="margin-bottom: 10px;">
            <label for="ad-url">AD Image URL:</label>
            <input type="url" id="ad-url" name="ad-url" placeholder="https://example.com/ad.jpg" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label for="page-url">Landing Page URL:</label><br>
            <input type="url" id="page-url" placeholder="https://yourwebsite.com" required style="width: 300px;">
        </div>

        <button type="submit">Personalize</button>
    </form>
    
</body>
</html>
